<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/main/resources/static/css/login-join.css"> <!-- 회원가입 페이지용 CSS 파일 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3&display=swap" rel="stylesheet">
    <title>회원 가입</title>
    <!--
        <script src="https://kit.fontawesome.com/5a9b8e0df0.js" crossorigin="anonymous"></script>
    -->
</head>
<body>
<div class="logo" id="logo">
    <i class="fa-solid fa-handcuffs"></i>
    <a href="index">Criminal Map</a>
</div>

<form action="sign-php/signup.php" method="POST"> <!-- 회원가입 정보를 처리할 PHP 파일로 수정 -->
    <div class="input-group">
        <label for="id">아이디</label>
        <input type="text" name="id" id="id" required>
    </div>
    <div class="input-group">
        <label for="pwd">비밀번호</label>
        <input type="password" name="pwd" id="pwd" required>
    </div>
    <div class="input-group">
        <label for="pwd-confirm">비밀번호 재확인</label>
        <input type="password" name="pwd-confirm" id="pwd-confirm" required>
    </div>
    <div class="input-group">
        <label for="email">이메일 주소</label>
        <input type="email" name="email" id="email" required>
    </div>
    <div class="btn_group">
        <button type="submit">가입하기</button>
        <a href="login">로그인</a>
    </div>
</form>
</body>
</html>
