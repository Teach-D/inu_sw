<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<div th:each="member : ${members}">
    itemA : <span th:text="${member.getItemA()}"></span>
    itemB : <span th:text="${member.getItemB()}"></span>
    itemC : <span th:text="${member.getItemC()}"></span>
    itemD : <span th:text="${member.getItemD()}"></span>
    itemE : <span th:text="${member.getItemE()}"></span>
</div>
</body>
</html>
